<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swift'Link</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

 <!-- 1. CHARGEMENT D'EMAILJS -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script type="text/javascript">
     (function(){
        emailjs.init("Apzn8FzYNZlXAQTs-");
     })();
  </script>
  

  <svg style="position:absolute;width:0;height:0;" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="lg-dist" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" seed="5" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <style>
    :root {
      --lg-bg: rgba(255,255,255,0.12);
      --lg-hi: rgba(255,255,255,0.70);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
  body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 32px 16px 64px;
      
      /* 1. Couleur bleu nuit très sombre pour masquer les côtés vides sur PC */
      background-color: #030a1c; 
      
      /* 2. On charge ton image */
      background-image: url('bg-blu.jpg'); 
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-position: center top;
      
      /* 3. SUR MOBILE : L'image s'adapte et remplit l'écran du téléphone */
      background-size: cover; 
    }

    /* 4. SUR PC (Écrans larges) : On force l'image à garder sa taille "téléphone" dézoomée */
    @media (min-width: 481px) {
      body {
        background-size: 480px 100vh; 
      }
    }
    @keyframes bg-move {
      from { background-position:center center; }
      to   { background-position:center top; }
    }

    /* ══ GLASS ══ */
    .glass-card {
      position:relative; border-radius:28px; overflow:hidden;
      transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,2.2), box-shadow 0.3s ease;
    }
    .glass-card:hover { transform:translateY(-4px) scale(1.025); }
    .glass-filter {
      position:absolute; inset:0; z-index:0;
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    }
    .glass-overlay { position:absolute; inset:0; z-index:1; background:var(--lg-bg); }
    .glass-specular {
      position:absolute; inset:0; z-index:2; border-radius:inherit; overflow:hidden;
      box-shadow:inset 1px 1px 0 var(--lg-hi), inset 0 0 8px var(--lg-hi);
    }
    .glass-content { position:relative; z-index:3; }

    /* ══ HEADER — contour asymétrique, blanc réduit de 15% ══ */
    /* blanc vif 0.90 → 0.765 ; bleu reste pareil */
    .profile-card { width:100%; max-width:480px; margin-bottom:16px; }
    .profile-border {
      position:absolute; inset:0; border-radius:28px; pointer-events:none; z-index:10;
      background:
        linear-gradient(135deg,
          rgba(255,255,255,0.765) 0%,
          rgba(255,255,255,0.765) 12%,
          rgba(100,160,255,0.28)  28%,
          rgba(100,160,255,0.18)  55%,
          rgba(100,160,255,0.28)  72%,
          rgba(255,255,255,0.722) 88%,
          rgba(255,255,255,0.722) 100%
        ) border-box;
      -webkit-mask:
        linear-gradient(#fff 0 0) padding-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite:destination-out;
      mask-composite:exclude;
      border:1.5px solid transparent;
    }
    .profile-inner {
      display:flex; flex-direction:column; align-items:center;
      gap:12px; padding:36px 24px 30px;
    }
    .profile-avatar {
      width:110px; height:110px; border-radius:50%;
      object-fit:contain; background:rgba(255,255,255,0.85); padding:8px;
      box-shadow:0 4px 20px rgba(0,0,0,0.18), inset 0 0 0 1.5px rgba(255,255,255,0.5);
    }
    .profile-name {
      font-size:24px; font-weight:800; color:#fff;
      letter-spacing:-0.5px; text-align:center;
      text-shadow:0 2px 12px rgba(0,40,120,0.4);
    }
    .profile-sub { font-size:14px; color:rgba(220,235,255,0.85); font-weight:500; text-align:center; }

    /* ══ BENTO GRID ══ */
    .bento {
      width:100%; max-width:480px;
      display:grid;
      grid-template-columns:1fr 1fr;
      grid-template-rows:auto auto;
      gap:14px;
    }
    .card-instagram { grid-column:1; grid-row:1; }
    .card-google    { grid-column:2; grid-row:1; }
    .card-mail      { grid-column:1/-1; grid-row:2; }

    /* Bentos haut — hauteur automatique, on mesure en JS */
    .insta-inner, .google-inner {
      display:grid;
      grid-template-rows:1fr auto auto;
      align-items:center; justify-items:center;
      padding:26px 16px 20px; gap:14px;
    }
    .platform-icon {
      width:82px; height:82px; object-fit:contain; filter:none;
      transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,2.2);
    }
    .platform-icon:hover { transform:scale(0.95); }
    .card-label {
      font-size:14px; font-weight:700; color:#fff;
      text-shadow:0 1px 8px rgba(0,40,120,0.3);
      text-align:center; line-height:1.4;
    }

    /* ══ BOUTONS plateforme ══ */
    .btn-platform {
      width:100%; height:3em; border-radius:30em;
      font-size:15px; font-family:'Poppins',inherit; font-weight:800;
      border:none; position:relative; overflow:hidden; z-index:1; cursor:pointer;
      background:rgba(255,255,255,0.90);
      box-shadow:4px 4px 10px rgba(0,0,0,0.15),-4px -4px 10px rgba(255,255,255,0.6);
      transition:color 0.3s ease, box-shadow 0.3s ease;
    }
    .btn-platform::before {
      content:''; width:0; height:3em; border-radius:30em;
      position:absolute; top:0; left:0;
      transition:width 0.4s ease; z-index:-1;
    }
    .btn-platform:active::before { width:100%; }
    .btn-platform:active { color:#fff !important; box-shadow:none; }
    .btn-platform:hover { box-shadow:4px 4px 14px rgba(0,0,0,0.18),-4px -4px 14px rgba(255,255,255,0.7); }
    .btn-insta  { color:#d6249f; }
    .btn-insta::before  { background:radial-gradient(circle at 30% 107%,#fdf497 0%,#fd5949 30%,#d6249f 60%,#285AEB 90%); }
    .btn-google-plat { color:#4285F4; }
    .btn-google-plat::before { background:conic-gradient(from 0deg,#4285F4 0%,#34A853 25%,#FBBC05 50%,#EA4335 75%,#4285F4 100%); }
    .btn-platform .btn-text { position:relative; z-index:2; }

    /* ══ BENTO MAIL — 3 sections ══ */
    /* Hauteur = 1.5× bento insta, gérée via CSS variable mise par JS */
    .card-mail-wrapper {
      grid-column:1/-1; grid-row:2;
      position:relative; border-radius:28px; overflow:visible;
      transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,2.2);
    }
    /* On re-clip uniquement le fond glass, pas le contenu */
    .card-mail-wrapper .glass-filter,
    .card-mail-wrapper .glass-overlay,
    .card-mail-wrapper .glass-specular {
      border-radius:28px;
      overflow:hidden;
    }

    .mail-body {
      display:flex; flex-direction:column;
      height:var(--mail-height, 390px);
    }

    /* Section 1 — zone drop */
    .mail-s1 {
      flex:1;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:10px; padding:20px 20px 12px;
      border-bottom:1px solid rgba(150,200,255,0.18);
    }
    .mail-s1-title {
      font-size:14px; font-weight:700; color:#fff;
      text-shadow:0 1px 6px rgba(0,40,120,0.3); text-align:center;
    }
    .drop-zone {
      width:100%;
      border:2px dashed rgba(150,200,255,0.45);
      border-radius:16px; padding:16px 12px;
      display:flex; flex-direction:column; align-items:center; gap:10px;
      cursor:pointer;
      transition:border-color 0.3s, background 0.3s;
      background:rgba(255,255,255,0.04);
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color:rgba(150,200,255,0.9);
      background:rgba(100,160,255,0.08);
    }
    .drop-icon {
      width:52px; height:52px; border-radius:50%;
      background:rgba(100,160,255,0.18);
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 0 0 8px rgba(100,160,255,0.07);
    }
    .drop-icon svg { width:24px; height:24px; fill:rgba(180,210,255,0.9); }
    .drop-hint { font-size:11px; color:rgba(180,210,255,0.55); text-align:center; line-height:1.4; }

    /* Section 2 — aperçu fichier */
    .mail-s2 {
      padding:12px 16px;
      border-bottom:1px solid rgba(150,200,255,0.18);
      min-height:68px;
      display:flex; align-items:center;
      position:relative; z-index:5;
      overflow:visible;
    }
    .file-empty {
      width:100%; text-align:center;
      font-size:12px; color:rgba(180,210,255,0.35); font-style:italic;
      transition: opacity 0.2s;
    }
    .file-empty.hidden { opacity:0; pointer-events:none; }
    .file-preview {
      display:none; width:100%;
      align-items:center; gap:12px;
      position:absolute; left:16px; right:16px;
    }
    .file-preview.visible { display:flex; }
    .file-icon {
      width:40px; height:40px; border-radius:10px;
      background:linear-gradient(135deg,#0069ff,#00c6ff);
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .file-icon svg { width:20px; height:20px; fill:white; }
    .file-info { flex:1; min-width:0; }
    .file-name-txt { font-size:13px; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .file-size-txt { font-size:11px; color:rgba(200,220,255,0.6); margin-top:2px; }

    /* Barre de progression */
    .progress-bar {
      display:none; width:100%; height:3px;
      background:rgba(255,255,255,0.15); border-radius:99px; margin-top:6px; overflow:hidden;
    }
    .progress-bar.visible { display:block; }
    .progress-fill {
      height:100%; width:0%; border-radius:99px;
      background:linear-gradient(90deg,#0069ff,#00c6ff);
      transition:width 0.6s ease;
    }

    .file-remove {
      width:28px; height:28px; border-radius:50%; border:none; cursor:pointer;
      background:rgba(255,255,255,0.12); color:rgba(200,220,255,0.8); font-size:14px;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
      transition:background 0.2s;
    }
    .file-remove:hover { background:rgba(255,80,80,0.3); color:#fff; }

    /* Section 3 — boutons */
    .mail-s3 {
      padding:12px 16px;
      display:grid; grid-template-columns:1fr 1fr; gap:10px;
    }
    .btn-cancel {
      height:2.8em; border-radius:30em;
      font-size:14px; font-family:'Poppins',inherit; font-weight:700;
      border:1.5px solid rgba(200,220,255,0.35); cursor:pointer;
      color:rgba(200,220,255,0.8); background:transparent;
      transition:all 0.2s;
    }
    .btn-cancel:hover { background:rgba(255,255,255,0.08); }
    .btn-send {
      height:2.8em; border-radius:30em;
      font-size:14px; font-family:'Poppins',inherit; font-weight:800;
      border:none; cursor:pointer; color:#fff;
      background:linear-gradient(135deg,#0069ff,#00c6ff);
      box-shadow:0 4px 16px rgba(0,105,255,0.40);
      transition:all 0.2s; opacity:0.45; pointer-events:none;
    }
    .btn-send.ready { opacity:1; pointer-events:auto; }
    .btn-send:hover { box-shadow:0 6px 20px rgba(0,105,255,0.55); transform:translateY(-1px); }
    #file-input { display:none; }

    /* ══ LOADER (2× plus lent) ══ */
    .loader-section { display:flex; flex-direction:column; align-items:center; gap:12px; margin-top:48px; }
    .loader-label { font-size:12px; font-weight:500; color:rgba(200,220,255,0.55); letter-spacing:0.5px; }
    .loader { --size:130px; --dur:4s; height:var(--size); aspect-ratio:1; position:relative; }
    .loader .box {
      position:absolute;
      background:linear-gradient(0deg,rgba(100,160,255,0.10) 0%,rgba(255,255,255,0.18) 100%);
      border-radius:50%; border-top:1px solid rgba(150,200,255,0.7);
      backdrop-filter:blur(4px);
      animation:ripple var(--dur) infinite ease-in-out;
    }
    .loader .box:nth-child(1) { inset:40%; z-index:99; }
    .loader .box:nth-child(2) { inset:30%; z-index:98; border-color:rgba(150,200,255,0.5); animation-delay:0.4s; }
    .loader .box:nth-child(3) { inset:20%; z-index:97; border-color:rgba(150,200,255,0.35); animation-delay:0.8s; }
    .loader .box:nth-child(4) { inset:10%; z-index:96; border-color:rgba(150,200,255,0.2); animation-delay:1.2s; }
    .loader .box:nth-child(5) { inset:0%; z-index:95; border-color:rgba(150,200,255,0.08); animation-delay:1.6s; }
    .loader .logo { position:absolute; inset:0; display:grid; place-content:center; padding:28%; z-index:100; }
    .loader .logo img { width:100%; animation:logo-pulse var(--dur) infinite ease-in-out; }
    @keyframes ripple {
      0%,100% { transform:scale(1); }
      50%      { transform:scale(1.3); }
    }
    @keyframes logo-pulse { 0%,100% { opacity:0.45; } 50% { opacity:1; } }
  </style>
</head>

  <script>
    // ── Hauteur bento mail = 1.5× hauteur bento insta ──
    function setMailHeight() {
      const insta = document.getElementById('card-insta');
      const mail  = document.getElementById('mail-body');
      if (insta && mail) {
        const h = insta.offsetHeight * 1.5;
        mail.style.height = h + 'px';
        document.getElementById('card-mail').style.minHeight = h + 'px';
      }
    }
    window.addEventListener('load', setMailHeight);
    window.addEventListener('resize', setMailHeight);

    // ── Gestion fichier ──
    const fileInput   = document.getElementById('file-input');
    const dropZone    = document.getElementById('drop-zone');
    const preview     = document.getElementById('file-preview');
    const emptyMsg    = document.getElementById('file-empty');
    const fnameEl     = document.getElementById('fname');
    const fsizeEl     = document.getElementById('fsize');
    const btnSend     = document.getElementById('btn-send');
    const progressBar = document.getElementById('progress-bar');
    const progressFill= document.getElementById('progress-fill');
    let selectedFile  = null;

    function formatSize(b) {
      if (b < 1024) return b + ' o';
      if (b < 1048576) return (b/1024).toFixed(1) + ' Ko';
      return (b/1048576).toFixed(1) + ' Mo';
    }

    function showFile(file) {
      selectedFile = file;
      fnameEl.textContent = file.name;
      fsizeEl.textContent = formatSize(file.size);
      emptyMsg.classList.add('hidden');
      preview.classList.add('visible');
      progressBar.classList.add('visible');
      setTimeout(() => { progressFill.style.width = '100%'; }, 100);
      btnSend.classList.add('ready');
    }

    function clearFile() {
      selectedFile = null;
      fileInput.value = '';
      preview.classList.remove('visible');
      emptyMsg.classList.remove('hidden');
      progressBar.classList.remove('visible');
      progressFill.style.width = '0%';
      btnSend.classList.remove('ready');
    }

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) showFile(fileInput.files[0]);
    });

    // Drag & drop
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault(); dropZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) showFile(e.dataTransfer.files[0]);
    });

// 3. FONCTION D'ENVOI RETOUR SUR EMAILJS (Abonnement Premium)
    function sendWithAttachment() {
      const nameInput = document.getElementById('sender-name');
      const emailInput = document.getElementById('sender-email');
      
      const senderName = nameInput ? nameInput.value.trim() : "";
      const senderEmail = emailInput ? emailInput.value.trim() : "";

      if (!senderName) {
        alert("Veuillez renseigner votre Nom et Prénom avant d'envoyer.");
        if(nameInput) nameInput.focus();
        return;
      }

      if (!selectedFile) {
        alert("Veuillez d'abord sélectionner un fichier.");
        return;
      }

      // Animation du bouton pendant le chargement
      btnSend.textContent = "Envoi en cours...";
      btnSend.style.opacity = "0.6";
      btnSend.disabled = true;

      // Lecture du fichier pour EmailJS
      const reader = new FileReader();
      reader.readAsDataURL(selectedFile);

      reader.onload = function () {
        const base64File = reader.result;

        // Préparation des variables pour ton template EmailJS
        const templateParams = {
          name_sender: senderName,
          email_sender: senderEmail,
          file_name: selectedFile.name,
          my_file: base64File // Relié à {{my_file}} dans ton Dynamic Attachment
        };

        // Envoi officiel via EmailJS
        emailjs.send('service_3svkyii', 'template_hlj4f0g', templateParams)
          .then(function(response) {
             alert("Succès ! L'ordonnance de " + senderName + " a bien été envoyée.");
             
             // Remise à zéro
             clearFile(); 
             if(nameInput) nameInput.value = "";
             if(emailInput) emailInput.value = "";
          }, function(error) {
             console.error("Échec EmailJS :", error);
             alert("Erreur lors de l'envoi. Veuillez réessayer.");
          })
          .finally(() => {
             // Remise à zéro du bouton
             btnSend.textContent = "Envoyer par mail";
             btnSend.style.opacity = "1";
             btnSend.disabled = false;
             if (selectedFile) btnSend.classList.add('ready');
          });
      };

      reader.onerror = function (error) {
        console.error("Erreur de lecture :", error);
        alert("Impossible de lire le fichier.");
        
        btnSend.textContent = "Envoyer par mail";
        btnSend.style.opacity = "1";
        btnSend.disabled = false;
      };
    }
    
  </script>
