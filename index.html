<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,  initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Swift'Link</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script type="text/javascript">
     (function(){
        emailjs.init("Apzn8FzYNZlXAQTs-");
     })();
  </script>
  
  <svg style="position:absolute;width:0;height:0;" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="lg-dist" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" seed="5" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <style>
    :root {
      --lg-bg: rgba(255,255,255,0.12);
      --lg-hi: rgba(255,255,255,0.70);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 32px 16px 64px;
      background-color: #030a1c; 
      background-image: url('bg_black.jpg'); 
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-position: center top;
      background-size: cover; 
    }

    @media (min-width: 481px) {
      body {
        background-size: 480px 100vh; 
      }
    }

    /* ══ GLASS ══ */
    .glass-card {
      position:relative; border-radius:28px; overflow:hidden;
      transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,2.2), box-shadow 0.3s ease;
    }
    .glass-card:hover { transform:translateY(-4px) scale(1.025); }
    .glass-filter {
      position:absolute; inset:0; z-index:0;
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    }
    .glass-overlay { position:absolute; inset:0; z-index:1; background:var(--lg-bg); }
    .glass-specular {
      position:absolute; inset:0; z-index:2; border-radius:inherit; overflow:hidden;
      box-shadow:inset 1px 1px 0 var(--lg-hi), inset 0 0 8px var(--lg-hi);
    }
    .glass-content { position:relative; z-index:3; }

    /* ══ HEADER ══ */
    .profile-card { width:100%; max-width:480px; margin-bottom:16px; }
    .profile-border {
      position:absolute; inset:0; border-radius:28px; pointer-events:none; z-index:10;
      background: linear-gradient(135deg, rgba(255,255,255,0.765) 0%, rgba(255,255,255,0.765) 12%, rgba(100,160,255,0.28) 28%, rgba(100,160,255,0.18) 55%, rgba(100,160,255,0.28) 72%, rgba(255,255,255,0.722) 88%, rgba(255,255,255,0.722) 100%) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite:destination-out;
      mask-composite:exclude;
      border:1.5px solid transparent;
    }
    .profile-inner {
      display:flex; flex-direction:column; align-items:center;
      gap:12px; padding:36px 24px 30px;
    }
    .profile-avatar {
      width:110px; height:110px; border-radius:50%;
      object-fit:contain; background:rgba(255,255,255,0.85); padding:8px;
      box-shadow:0 4px 20px rgba(0,0,0,0.18), inset 0 0 0 1.5px rgba(255,255,255,0.5);
    }
    .profile-name {
      font-size:24px; font-weight:800; color:#fff;
      letter-spacing:-0.5px; text-align:center;
      text-shadow:0 2px 12px rgba(0,40,120,0.4);
    }
    .profile-sub { font-size:14px; color:rgba(220,235,255,0.85); font-weight:500; text-align:center; }

    /* ══ BENTO GRID ══ */
    .bento {
      width:100%; max-width:480px;
      display:grid;
      grid-template-columns:1fr 1fr;
      grid-template-rows:auto auto;
      gap:14px;
    }
    .card-instagram { grid-column:1; grid-row:1; }
    .card-google    { grid-column:2; grid-row:1; }

    .insta-inner, .google-inner {
      display:grid;
      grid-template-rows:1fr auto auto;
      align-items:center; justify-items:center;
      padding:26px 16px 20px; gap:14px;
    }
    .platform-icon {
      width:82px; height:82px; object-fit:contain; filter:none;
      transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,2.2);
    }
    .platform-icon:hover { transform:scale(0.95); }
    .card-label {
      font-size:14px; font-weight:700; color:#fff;
      text-shadow:0 1px 8px rgba(0,40,120,0.3);
      text-align:center; line-height:1.4;
    }

    /* ══ BOUTONS plateforme ══ */
    .btn-platform {
      width:100%; height:3em; border-radius:30em;
      font-size:15px; font-family:'Poppins',inherit; font-weight:800;
      border:none; position:relative; overflow:hidden; z-index:1; cursor:pointer;
      background:rgba(255,255,255,0.90);
      box-shadow:4px 4px 10px rgba(0,0,0,0.15),-4px -4px 10px rgba(255,255,255,0.6);
      transition:color 0.3s ease, box-shadow 0.3s ease;
    }
    .btn-platform::before {
      content:''; width:0; height:3em; border-radius:30em;
      position:absolute; top:0; left:0;
      transition:width 0.4s ease; z-index:-1;
    }
    .btn-platform:active::before { width:100%; }
    .btn-platform:active { color:#fff !important; box-shadow:none; }
    .btn-platform:hover { box-shadow:4px 4px 14px rgba(0,0,0,0.18),-4px -4px 14px rgba(255,255,255,0.7); }
    .btn-insta  { color:#d6249f; }
    .btn-insta::before  { background:radial-gradient(circle at 30% 107%,#fdf497 0%,#fd5949 30%,#d6249f 60%,#285AEB 90%); }
    .btn-google-plat { color:#4285F4; }
    .btn-google-plat::before { background:conic-gradient(from 0deg,#4285F4 0%,#34A853 25%,#FBBC05 50%,#EA4335 75%,#4285F4 100%); }
    .btn-platform .btn-text { position:relative; z-index:2; }

    /* ======================================================= */
    /* NOUVEAU COMPOSANT D' PREMIUM (STYLE FONCÉ)      */
    /* ======================================================= */
   .-container {
      grid-column: 1 / -1;
      width: 100%;
      border-radius: 28px;
      padding: 24px;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
      /* Glass layers inline (pas de glass-card wrapper ici) */
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: var(--lg-bg);
      /* Même contour lumineux que les autres cards */
      background-image:
        linear-gradient(135deg,
          rgba(255,255,255,0.765) 0%,
          rgba(255,255,255,0.765) 12%,
          rgba(100,160,255,0.28) 28%,
          rgba(100,160,255,0.18) 55%,
          rgba(100,160,255,0.28) 72%,
          rgba(255,255,255,0.722) 88%,
          rgba(255,255,255,0.722) 100%
        );
      background-clip: padding-box;
      border: 1.5px solid transparent;
      /* Contour en pseudo-élément via box-shadow interne */
      box-shadow:
        inset 1px 1px 0 rgba(255,255,255,0.70),
        inset 0 0 8px rgba(255,255,255,0.70),
        0 8px 32px rgba(0,0,0,0.25);
      /* Réinitialise le background-image pour ne garder que le fond glass */
      background: var(--lg-bg);
    }
    /* Champs de saisie intégrés au style sombre */
    .input-group label {
      display: block; margin-bottom: 8px; font-weight: 500; color: #fff; font-size: 14px;
    }
    .input-group input {
      width: 100%; padding: 12px; border-radius: 8px; 
      border: 1px solid rgba(255,255,255,0.2); 
      background: rgba(255,255,255,0.05); color: #fff; 
      font-family: 'Inter', sans-serif; font-size: 14px;
      margin-bottom: 16px; transition: border 0.3s;
    }
    .input-group input:focus {
      outline: none; border-color: rgba(42, 95, 255, 0.8);
    }

    /* Zone de clic pour le fichier */
    .file-trigger-zone {
      position: relative;
      padding: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px dashed rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .file-trigger-zone:hover { background: rgba(255, 255, 255, 0.08); }

    /* Bouton de suppression du fichier */
.file-remove-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 30;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.15);
  border: 1px solid rgba(255, 255, 255, 0.25);
  color: #fff;
  font-size: 14px;
  line-height: 1;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.file-remove-btn:hover { background: rgba(220, 60, 60, 0.55); }

    .file-trigger-zone input[type="file"] {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer; z-index: 20;
    }

    .file-info-row { display: flex; align-items: center; gap: 18px; }

   /* Icone Dossier 3D */
    .folder-icon-container { position: relative; width: 68px; height: 56px; filter: drop-shadow(0 6px 20px rgba(26, 63, 204, 0.55)); }
    .folder-back { position: absolute; top: 0; left: 0; width: 58px; height: 44px; background: linear-gradient(135deg, #112ba1, #1a3fcc); border-radius: 6px 12px 6px 6px; }
    .folder-back::before { content: ''; position: absolute; top: -4px; left: 0; width: 24px; height: 10px; background: #112ba1; border-radius: 4px 4px 0 0; }
    .folder-front { position: absolute; bottom: 0; left: 2px; width: 64px; height: 44px; background: linear-gradient(135deg, #1a3fcc, #2a5fff); border-radius: 6px; transform: skewX(-3deg); overflow: hidden; }
    .folder-front::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 50%; background: linear-gradient(to bottom, rgba(255, 255, 255, 0.15), transparent); }
    .badge-files { position: absolute; bottom: 4px; left: -10px; z-index: 10; background: rgba(30, 80, 240, 0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.15); color: #ffffff; font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 6px; letter-spacing: 0.5px; }


    .text-details { display: flex; flex-direction: column; gap: 3px; }
    .title { color: #ffffff; font-size: 16px; font-weight: 700; letter-spacing: -0.2px; }
    .subtitle { color: #8888aa; font-size: 12px; font-weight: 500; }

    /* Panneau de progression */
    .progress-panel {
      margin-top: 18px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 14px;
      padding: 14px 16px;
      display: none; 
      flex-direction: column;
      gap: 12px;
    }
    .progress-status-row { display: flex; justify-content: space-between; align-items: center; }
    .status-left { display: flex; align-items: center; gap: 10px; }
    .spinner { width: 14px; height: 14px; border: 2px solid #ffffff; border-right-color: transparent; border-radius: 50%; animation: rotate 1s linear infinite; }
    .status-text { color: #ffffff; font-size: 14px; }
    .percentage { color: #ffffff; font-size: 18px; font-weight: 700; }
    .progress-bar-bg { width: 100%; height: 6px; background: #1a1a2e; border-radius: 10px; overflow: hidden; }
    .progress-bar-fill {height: 100%;width: 0%;background: linear-gradient(90deg, #ffffff, #ccccee);border-radius: 10px;
  /* On enlève la durée fixe ici pour la gérer en JS */
  transition: width 0.5s ease-out; }
    
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* Bouton d'envoi EmailJS */
    .btn-send {
      width: 100%; height: 3.2em; border-radius: 30em;
      font-size: 15px; font-family: 'Poppins', inherit; font-weight: 800;
      border: none; cursor: pointer; color: #fff;
      background: linear-gradient(135deg, #1a3fcc, #2a5fff);
      box-shadow: 0 4px 16px rgba(26, 63, 204, 0.40);
      margin-top: 16px; transition: all 0.2s; display: none;
    }
    .btn-send:hover { box-shadow: 0 6px 20px rgba(26, 63, 204, 0.6); transform: translateY(-1px); }

    /* ══ LOADER (2× plus lent) ══ */
    .loader-section { display:flex; flex-direction:column; align-items:center; gap:12px; margin-top:48px; }
    .loader-label { font-size:12px; font-weight:500; color:rgba(200,220,255,0.55); letter-spacing:0.5px; }
    .loader { --size:130px; --dur:4s; height:var(--size); aspect-ratio:1; position:relative; }
    .loader .box { position:absolute; background:linear-gradient(0deg,rgba(100,160,255,0.10) 0%,rgba(255,255,255,0.18) 100%); border-radius:50%; border-top:1px solid rgba(150,200,255,0.7); backdrop-filter:blur(4px); animation:ripple var(--dur) infinite ease-in-out; }
    .loader .box:nth-child(1) { inset:40%; z-index:99; }
    .loader .box:nth-child(2) { inset:30%; z-index:98; border-color:rgba(150,200,255,0.5); animation-delay:0.4s; }
    .loader .box:nth-child(3) { inset:20%; z-index:97; border-color:rgba(150,200,255,0.35); animation-delay:0.8s; }
    .loader .box:nth-child(4) { inset:10%; z-index:96; border-color:rgba(150,200,255,0.2); animation-delay:1.2s; }
    .loader .box:nth-child(5) { inset:0%; z-index:95; border-color:rgba(150,200,255,0.08); animation-delay:1.6s; }
    .loader .logo { position:absolute; inset:0; display:grid; place-content:center; padding:28%; z-index:100; }
    .loader .logo img { width:100%; animation:logo-pulse var(--dur) infinite ease-in-out; }
    @keyframes ripple { 0%,100% { transform:scale(1); } 50% { transform:scale(1.3); } }
    @keyframes logo-pulse { 0%,100% { opacity:0.45; } 50% { opacity:1; } }
  </style>
</head>
<body>

  <div class="glass-card profile-card">
    <div class="glass-filter"></div>
    <div class="glass-overlay"></div>
    <div class="glass-specular"></div>
    <div class="profile-border"></div>
    <div class="glass-content profile-inner">
      <img class="profile-avatar" src="Logo NEW Swiftup_FULL_WHITE.png" alt="Logo">
      <div class="profile-name">Pharmacie AZERTY</div>
      <div class="profile-sub">Votre pharmacie de confiance à Paris</div>
    </div>
  </div>

  <div class="bento" id="bento-grid">

    <a href="https://www.instagram.com/swiftup_fr" target="_blank" class="glass-card card-instagram" style="text-decoration:none;">
      <div class="glass-filter"></div><div class="glass-overlay"></div><div class="glass-specular"></div>
      <div class="glass-content insta-inner">
        <img class="platform-icon" src="instagram-letter-white-logo-icon-ig-app-transparent-background-premium-social-media-design-for-digital-download-free-png.webp" alt="Instagram">
        <div class="card-label">Suivez-nous<br>sur Instagram !</div>
        <button class="btn-platform btn-insta">
          <span class="btn-text">S'abonner</span>
        </button>
      </div>
    </a>

    <a href="avis.html" class="glass-card card-google" style="text-decoration:none;">
      <div class="glass-filter"></div><div class="glass-overlay"></div><div class="glass-specular"></div>
      <div class="glass-content google-inner">
        <img class="platform-icon" src="⚠️ TON_IMAGE_BASE64_ICI ⚠️" alt="Google">
        <div class="card-label">Nos avis<br>Google</div>
        <button class="btn-platform btn-google-plat">
          <span class="btn-text">5 étoiles !</span>
        </button>
      </div>
    </a>

    <div class="-container">
      <div style="color:#fff; font-weight:800; font-size:18px; margin-bottom:30px; text-align:center;">Envoyer votre ordonnance</div>
      
      <div class="input-group">
        <label for="sender-name">Nom et Prénom :</label>
        <input type="text" id="sender-name" autocomplete="name" placeholder="Ex: DUPONT Jean">
        
        <label for="sender-phone">Téléphone (Optionnel) :</label>
        <input type="tel" id="sender-phone" autocomplete="tel" placeholder="06 12 34 56 78">
      </div>

      <div class="file-trigger-zone" id="drop-zone">
  <button class="file-remove-btn" id="removeFileBtn" title="Supprimer le fichier">✕</button>   <!-- AJOUTÉ -->
        
        <input type="file" id="fileInput" accept="image/*,application/pdf">
        <div class="file-info-row">
          <div class="folder-icon-container">
            <div class="folder-back"></div>
            <div class="folder-front"></div>
            <div class="badge-files">FILES</div>
          </div>
          <div class="text-details">
            <div id="Title" class="title">Ajouter un document</div>
            <div id="Subtitle" class="subtitle">Sélectionnez votre ordonnance</div>
          </div>
        </div>
      </div>
      
      <!-- Barre de progression -->
      <div id="progressPanel" class="progress-panel">
        <div class="progress-status-row">
          <div class="status-left">
            <div class="spinner" id="spinner"></div>
            <span class="status-text" id="statusText">Préparation...</span>
          </div>
          <div class="percentage" id="percentage">0%</div>
        </div>
        <div class="progress-bar-bg">
          <div id="progressBarFill" class="progress-bar-fill"></div>
        </div>
      </div>

      <button class="btn-send" id="btn-send" onclick="sendWithAttachment()">Envoyer l'ordonnance</button>
    </div>

  </div>

  <div class="loader-section">
    <div class="loader">
      <div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div>
      <div class="logo">
        <img src="Logo-test-swiftlink.png" alt="Logo">
      </div>
    </div>
    <span class="loader-label">Propulsé par Swift'Link</span>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const Title = document.getElementById('Title');
    const Subtitle = document.getElementById('Subtitle');
    const progressPanel = document.getElementById('progressPanel');
    const progressBarFill = document.getElementById('progressBarFill');
    const percentageText = document.getElementById('percentage');
    const statusText = document.getElementById('statusText');
    const spinner = document.getElementById('spinner');
    const btnSend = document.getElementById('btn-send');
    const phoneInput = document.getElementById('sender-phone'); // AJOUTÉ ICI
    const nameInput = document.getElementById('sender-name');   // AJOUTÉ ICI
    
    let selectedFile = null;
    

   // 2. FORMATAGE AUTOMATIQUE DU TÉLÉPHONE
if (phoneInput) {
  phoneInput.addEventListener('input', function(e) {
    let raw = e.target.value;

    if (raw.startsWith('+33')) {
      // Garde le +33 et formate le reste : +33 X XX XX XX XX
      let digits = raw.replace(/^\+33/, '').replace(/\D/g, '').substring(0, 9);
      let formatted = '+33';
      if (digits.length > 0) formatted += ' ' + digits.substring(0, 1);
      if (digits.length > 1) formatted += ' ' + digits.substring(1, 3);
      if (digits.length > 3) formatted += ' ' + digits.substring(3, 5);
      if (digits.length > 5) formatted += ' ' + digits.substring(5, 7);
      if (digits.length > 7) formatted += ' ' + digits.substring(7, 9);
      e.target.value = formatted;
    } else {
      let digits = raw.replace(/\D/g, '');
      if (digits.startsWith('0') && digits.length > 10) digits = digits.substring(0, 10);
      e.target.value = digits.replace(/(\d{2})(?=\d)/g, '$1 ');
    }
  });
}

// 3. GESTION DE L'AJOUT DE FICHIER
const removeFileBtn = document.getElementById('removeFileBtn');

fileInput.addEventListener('change', function(e) {
  selectedFile = e.target.files[0];
  if (selectedFile) {
    Title.innerText = selectedFile.name;
    Subtitle.innerText = (selectedFile.size / (1024 * 1024)).toFixed(2) + ' MB';
    removeFileBtn.style.display = 'flex';
    progressPanel.style.display = 'flex';
    btnSend.style.display = 'block';
    spinner.style.display = 'block';
    startSatisfyingLoading();
  }
});

removeFileBtn.addEventListener('click', function(e) {
  e.stopPropagation(); // empêche d'ouvrir le sélecteur de fichier
  selectedFile = null;
  fileInput.value = '';
  Title.innerText = 'Ajouter un document';
  Subtitle.innerText = 'Sélectionnez votre ordonnance';
  removeFileBtn.style.display = 'none';
  progressPanel.style.display = 'none';
  progressBarFill.style.width = '0%';
  spinner.style.display = 'block';
  btnSend.style.display = 'none';
});
    // 4. ANIMATION DE LA BARRE DE PROGRESSION
    function startSatisfyingLoading() {
      const bar = document.getElementById('progressBarFill');
      const percentText = document.getElementById('percentage');
      const statusText = document.getElementById('statusText');
      const spinnerEl = document.getElementById('spinner');

      bar.style.transition = "none";
      bar.style.width = "0%";
      percentText.innerText = "0%";
      statusText.innerText = "Préparation...";

      requestAnimationFrame(() => {
        bar.style.transition = "width 0.5s ease-out";
        bar.style.width = "50%";
        percentText.innerText = "50%";
        statusText.innerText = "Téléchargement...";
      });

      setTimeout(() => {
        bar.style.transition = "width 2.5s ease-in-out";
        bar.style.width = "75%";
        percentText.innerText = "75%";
      }, 500); 

      setTimeout(() => {
        bar.style.transition = "width 0.4s ease-in";
        bar.style.width = "100%";
        percentText.innerText = "100%";
        statusText.innerText = "Fichier prêt !";
        if (spinnerEl) spinnerEl.style.display = 'none';
      }, 3000); 
    }

    // 5. FONCTION D'ENVOI (EMAILJS)
    function sendWithAttachment() {
      const senderName = nameInput ? nameInput.value.trim() : "";
      const senderPhone = phoneInput ? phoneInput.value.trim().replace(/\s+/g, '') : "";

      if (!senderName) {
        alert("Veuillez renseigner votre Nom et Prénom.");
        if(nameInput) nameInput.focus();
        return;
      }

      // Vérification des règles du téléphone
      if (senderPhone.startsWith('0')) {
        if (senderPhone.length !== 10 || !/^\d+$/.test(senderPhone)) {
          alert("Le numéro commençant par 0 doit comporter exactement 10 chiffres.");
          if(phoneInput) phoneInput.focus();
          return;
        }
      } else {
        if (!/^\d+$/.test(senderPhone) || senderPhone.length < 7) {
          alert("Veuillez entrer un numéro de téléphone valide.");
          if(phoneInput) phoneInput.focus();
          return;
        }
      }

      if (!selectedFile) {
        alert("Veuillez sélectionner un fichier.");
        return;
      }

      // Bouton en mode "chargement"
      btnSend.textContent = "Envoi en cours...";
      btnSend.style.opacity = "0.6";
      btnSend.disabled = true;

      // Lecture et envoi à EmailJS
      const reader = new FileReader();
      reader.readAsDataURL(selectedFile);
      reader.onload = function () {
        const base64File = reader.result;

        const templateParams = {
          name_sender: senderName,
          phone_sender: senderPhone,
          file_name: selectedFile.name,
          my_file: base64File
        };

        emailjs.send('service_3svkyii', 'template_hlj4f0g', templateParams)
          .then(function(response) {
             alert("Succès ! L'ordonnance de " + senderName + " a bien été envoyée.");
             
             // Remise à zéro
             selectedFile = null;
             fileInput.value = "";
             if(nameInput) nameInput.value = "";
             if(phoneInput) phoneInput.value = "";
             
             Title.innerText = "Ajouter un document";
             Subtitle.innerText = "Sélectionnez votre ordonnance";
             progressPanel.style.display = 'none';
             progressBarFill.style.width = '0%';
             spinner.style.display = 'block';
             btnSend.style.display = 'none';

          }, function(error) {
             console.error("Échec EmailJS :", error);
             alert("Erreur lors de l'envoi. Veuillez réessayer.");
          })
          .finally(() => {
             btnSend.textContent = "Envoyer l'ordonnance";
             btnSend.style.opacity = "1";
             btnSend.disabled = false;
          });
      };
      
      reader.onerror = function (error) {
        console.error("Erreur de lecture :", error);
        alert("Impossible de lire le fichier.");
        btnSend.textContent = "Envoyer l'ordonnance";
        btnSend.style.opacity = "1";
        btnSend.disabled = false;
      };
    }
</script>
</body>
</html>
