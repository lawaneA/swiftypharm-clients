    @keyframes bg-move {
      from { background-position: center center; }
      to   { background-position: center top; }

    /* ══ GLASS ══ */
    .glass-card {
      position:relative; border-radius:28px; overflow:hidden;
      box-shadow:0 8px 16px rgba(0,0,0,0.10);
      transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,2.2), box-shadow 0.3s ease;
    }
    .glass-card:hover {
      transform:translateY(-4px) scale(1.025);
      box-shadow:0 16px 40px rgba(0,0,0,0.15);
    }
    .glass-filter {
      position:absolute; inset:0; z-index:0;
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      filter:url(#lg-dist); isolation:isolate;
    }
    .glass-overlay { position:absolute; inset:0; z-index:1; background:var(--lg-bg-color); }
    .glass-specular {
      position:absolute; inset:0; z-index:2; border-radius:inherit; overflow:hidden;
      box-shadow:inset 1px 1px 0 var(--lg-highlight), inset 0 0 8px var(--lg-highlight);
    }
    .glass-content { position:relative; z-index:3; }

    /* ══ HEADER ══ */
    .profile-card { width:100%; max-width:480px; margin-bottom:16px; }
    .profile-inner {
      display:flex; flex-direction:column; align-items:center;
      gap:12px; padding:36px 24px 30px;
    }
    .profile-avatar {
      width:110px; height:110px; border-radius:50%;
      object-fit:contain; background:rgba(255,255,255,0.85); padding:8px;
      box-shadow:0 4px 20px rgba(0,0,0,0.12), inset 0 0 0 1.5px rgba(255,255,255,0.6);
    }
    .profile-name {
      font-size:24px; font-weight:800; color:#1a1a2e;
      letter-spacing:-0.5px; text-align:center;
      text-shadow:0 1px 8px rgba(255,255,255,0.6);
    }
    .profile-sub { font-size:14px; color:rgba(60,60,90,0.8); font-weight:500; text-align:center; }

    /* ══ BENTO ══ */
    .bento { width:100%; max-width:480px; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .card-instagram { grid-column:1; }
    .card-google    { grid-column:2; }
    .card-mail      { grid-column:1/-1; }

    .insta-inner, .google-inner {
      display:grid;
      grid-template-rows: 1fr auto auto;
      align-items:center;
      justify-items:center;
      padding:26px 16px 20px;
      gap:14px;
      min-height:260px;
    }

    .platform-icon {
      width:82px; height:82px; object-fit:contain; filter:none;
      transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,2.2);
    }
    .platform-icon:hover { transform:scale(0.95); }

    .card-label {
      font-size:14px; font-weight:700; color:#ffffff;
      text-shadow:0 1px 6px rgba(0,0,0,0.18);
      text-align:center; line-height:1.4;
    }

    /* ══════════════════════════════════════════
       BOUTON STYLE (neutre blanc → couleur au clic)
    ══════════════════════════════════════════ */

    /* BASE — neutre blanc neumorphism */
    .btn-platform {
      width: 100%;
      height: 3em;
      border-radius: 30em;
      font-size: 15px;
      font-family: 'Poppins', inherit;
      font-weight: 800;
      border: none;
      position: relative;
      overflow: hidden;
      z-index: 1;
      cursor: pointer;
      color: #555;
      background: rgba(255,255,255,0.85);
      box-shadow: 4px 4px 10px rgba(0,0,0,0.12), -4px -4px 10px rgba(255,255,255,0.8);
      transition: color 0.3s ease, box-shadow 0.3s ease;
    }

    /* Pseudo-element : couleur de plateforme, se déploie au :active */
    .btn-platform::before {
      content: '';
      width: 0;
      height: 3em;
      border-radius: 30em;
      position: absolute;
      top: 0; left: 0;
      transition: width 0.4s ease;
      display: block;
      z-index: -1;
    }

    /* Au clic : couleur s'étend */
    .btn-platform:active::before { width: 100%; }
    .btn-platform:active { color: #fff; box-shadow: none; }

    /* Instagram → rose/violet/orange */
    .btn-insta::before {
      background-image: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 30%, #d6249f 60%, #285AEB 90%);
    }

    /* Google → conic multi-couleur */
    .btn-google::before {
      background-image: conic-gradient(from 0deg, #4285F4 0%, #34A853 25%, #FBBC05 50%, #EA4335 75%, #4285F4 100%);
    }

    /* Mail → bleu */
    .btn-mail-link {
      display: inline-flex; align-items: center; justify-content: center;
    }

    /* Hover léger pour feedback */
    .btn-platform:hover {
      box-shadow: 4px 4px 14px rgba(0,0,0,0.15), -4px -4px 14px rgba(255,255,255,0.9);
      color: #333;
    }

    /* Span texte toujours au-dessus */
    .btn-platform .btn-text {
      position: relative;
      z-index: 2;
    }

    /* ══ MAIL ══ */
    .mail-inner { display:flex; align-items:center; gap:18px; padding:22px 24px; }
    .mail-icon-wrap {
      width:54px; height:54px;
      background:linear-gradient(135deg,#0069ff,#00c6ff);
      border-radius:16px; display:flex; align-items:center; justify-content:center;
      flex-shrink:0;
      box-shadow:0 4px 16px rgba(0,105,255,0.35);
    }
    .mail-icon-wrap svg { width:28px; height:28px; fill:white; }
    .mail-text h3 { font-size:15px; font-weight:700; color:#ffffff; text-shadow:0 1px 6px rgba(0,0,0,0.15); }
    .mail-text p { font-size:12px; color:rgba(255,255,255,0.75); margin-top:3px; }
    .mail-arrow { margin-left:auto; font-size:26px; color:rgba(255,255,255,0.5); }

    /* ══ LOADER ══ */
    .loader-section { display:flex; flex-direction:column; align-items:center; gap:12px; margin-top:48px; }
    .loader-label { font-size:12px; font-weight:500; color:rgba(80,80,120,0.55); letter-spacing:0.5px; }
    .loader { --size:130px; --duration:2s; height:var(--size); aspect-ratio:1; position:relative; }
    .loader .box {
      position:absolute;
      background:linear-gradient(0deg, rgba(200,210,255,0.15) 0%, rgba(255,255,255,0.25) 100%);
      border-radius:50%; border-top:1px solid rgba(150,170,220,0.7);
      box-shadow:rgba(100,120,200,0.12) 0px 10px 10px 0px;
      backdrop-filter:blur(4px);
      animation:ripple var(--duration) infinite ease-in-out;
    }
    .loader .box:nth-child(1) { inset:40%; z-index:99; }
    .loader .box:nth-child(2) { inset:30%; z-index:98; border-color:rgba(150,170,220,0.5); animation-delay:0.2s; }
    .loader .box:nth-child(3) { inset:20%; z-index:97; border-color:rgba(150,170,220,0.35); animation-delay:0.4s; }
    .loader .box:nth-child(4) { inset:10%; z-index:96; border-color:rgba(150,170,220,0.2); animation-delay:0.6s; }
    .loader .box:nth-child(5) { inset:0%; z-index:95; border-color:rgba(150,170,220,0.08); animation-delay:0.8s; }
    .loader .logo { position:absolute; inset:0; display:grid; place-content:center; padding:28%; z-index:100; }
    .loader .logo img { width:100%; animation:logo-pulse var(--duration) infinite ease-in-out; filter:brightness(0) saturate(100%) invert(27%) sepia(90%) saturate(1500%) hue-rotate(204deg); }
    @keyframes ripple {
      0%,100% { transform:scale(1); box-shadow:rgba(100,120,200,0.12) 0px 10px 10px 0px; }
      50%      { transform:scale(1.3); box-shadow:rgba(100,120,200,0.18) 0px 30px 20px 0px; }
    }
    @keyframes logo-pulse { 0%,100% { opacity:0.4; } 50% { opacity:1; } }
  </style>
