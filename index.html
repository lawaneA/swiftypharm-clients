    /* ══ GLASS ══ */
    .glass-card {
      position:relative; border-radius:28px; overflow:hidden;
      transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,2.2), box-shadow 0.3s ease;
    }
    .glass-card:hover { transform:translateY(-4px) scale(1.025); }
    .glass-filter {
      position:absolute; inset:0; z-index:0;
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    }
    .glass-overlay { position:absolute; inset:0; z-index:1; background:var(--lg-bg-color); }
    .glass-specular {
      position:absolute; inset:0; z-index:2; border-radius:inherit; overflow:hidden;
      box-shadow:inset 1px 1px 0 var(--lg-highlight), inset 0 0 8px var(--lg-highlight);
    }
    .glass-content { position:relative; z-index:3; }

    /* ══ HEADER avec contour lumineux (coin haut-gauche & bas-droite blancs) ══ */
    .profile-card {
      width:100%; max-width:480px; margin-bottom:16px;
      border-radius:28px;
      /* Contour asymétrique : haut-gauche blanc vif, bas-droite blanc vif, reste bleu translucide */
      outline: none;
      box-shadow:
        /* coin haut-gauche : blanc vif */
        -2px -2px 0 0 rgba(255,255,255,0.85),
        /* coin bas-droite : blanc vif */
        2px 2px 0 0 rgba(255,255,255,0.82),
        /* bords globaux translucides bleutés comme l'exemple */
        0 0 0 1px rgba(100,160,255,0.35),
        /* glow général */
        0 8px 32px rgba(0,40,120,0.25);
      /* Fallback : border via outline trick */
    }
    /* On utilise une border dégradée via pseudo-element pour le contour coloré */
    .profile-card::after {
      content:'';
      position:absolute; inset:0; border-radius:28px; pointer-events:none; z-index:10;
      background: transparent;
      box-shadow:
        inset 0 0 0 1.5px rgba(255,255,255,0.18);
      /* Simulation coin haut-gauche + bas-droite avec border-image-like trick */
      border: 1.5px solid transparent;
      background-clip: padding-box;
    }
    /* Réelle bordure asymétrique via pseudo + clip-path */
    .profile-border {
      position:absolute; inset:0; border-radius:28px; pointer-events:none; z-index:10;
      background:
        linear-gradient(135deg,
          rgba(255,255,255,0.90) 0%,
          rgba(255,255,255,0.90) 12%,
          rgba(100,160,255,0.28) 28%,
          rgba(100,160,255,0.18) 55%,
          rgba(100,160,255,0.28) 72%,
          rgba(255,255,255,0.85) 88%,
          rgba(255,255,255,0.85) 100%
        ) border-box;
      -webkit-mask:
        linear-gradient(#fff 0 0) padding-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      border: 1.5px solid transparent;
    }

    .profile-inner {
      display:flex; flex-direction:column; align-items:center;
      gap:12px; padding:36px 24px 30px;
    }
    .profile-avatar {
      width:110px; height:110px; border-radius:50%;
      object-fit:contain; background:rgba(255,255,255,0.85); padding:8px;
      box-shadow:0 4px 20px rgba(0,0,0,0.18), inset 0 0 0 1.5px rgba(255,255,255,0.5);
    }
    .profile-name {
      font-size:24px; font-weight:800; color:#fff;
      letter-spacing:-0.5px; text-align:center;
      text-shadow:0 2px 12px rgba(0,40,120,0.4);
    }
    .profile-sub { font-size:14px; color:rgba(220,235,255,0.85); font-weight:500; text-align:center; }

    /* ══ BENTO ══ */
    .bento { width:100%; max-width:480px; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .card-instagram { grid-column:1; }
    .card-google    { grid-column:2; }
    .card-mail      { grid-column:1/-1; }

    .insta-inner, .google-inner {
      display:grid;
      grid-template-rows: 1fr auto auto;
      align-items:center; justify-items:center;
      padding:26px 16px 20px; gap:14px; min-height:260px;
    }
    .platform-icon {
      width:82px; height:82px; object-fit:contain; filter:none;
      transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,2.2);
    }
    .platform-icon:hover { transform:scale(0.95); }
    .card-label {
      font-size:14px; font-weight:700; color:#fff;
      text-shadow:0 1px 8px rgba(0,40,120,0.3);
      text-align:center; line-height:1.4;
    }

    /* ══ BOUTONS (neutre → couleur au clic) ══ */
    .btn-platform {
      width:100%; height:3em;
      border-radius:30em;
      font-size:15px; font-family:'Poppins',inherit; font-weight:800;
      border:none; position:relative; overflow:hidden; z-index:1; cursor:pointer;
      color:#333;
      background:rgba(255,255,255,0.88);
      box-shadow:4px 4px 10px rgba(0,0,0,0.15), -4px -4px 10px rgba(255,255,255,0.6);
      transition:color 0.3s ease, box-shadow 0.3s ease;
    }
    .btn-platform::before {
      content:''; width:0; height:3em; border-radius:30em;
      position:absolute; top:0; left:0;
      transition:width 0.4s ease; display:block; z-index:-1;
    }
    .btn-platform:active::before { width:100%; }
    .btn-platform:active { color:#fff !important; box-shadow:none; }
    .btn-platform:hover {
      box-shadow:4px 4px 14px rgba(0,0,0,0.18), -4px -4px 14px rgba(255,255,255,0.7);
    }
    .btn-insta { color: #d6249f; }
    .btn-insta::before {
      background-image:radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 30%, #d6249f 60%, #285AEB 90%);
    }
    .btn-google { color: #4285F4; }
    .btn-google::before {
      background-image:conic-gradient(from 0deg, #4285F4 0%, #34A853 25%, #FBBC05 50%, #EA4335 75%, #4285F4 100%);
    }
    .btn-platform .btn-text { position:relative; z-index:2; }

    /* ══ LOADER ══ */
    .loader-section { display:flex; flex-direction:column; align-items:center; gap:12px; margin-top:48px; }
    .loader-label { font-size:12px; font-weight:500; color:rgba(200,220,255,0.6); letter-spacing:0.5px; }
    .loader { --size:130px; --duration:4s; height:var(--size); aspect-ratio:1; position:relative; }
    .loader .box {
      position:absolute;
      background:linear-gradient(0deg, rgba(100,160,255,0.10) 0%, rgba(255,255,255,0.18) 100%);
      border-radius:50%; border-top:1px solid rgba(150,200,255,0.7);
      box-shadow:rgba(0,80,200,0.15) 0px 10px 10px 0px;
      backdrop-filter:blur(4px);
      animation:ripple var(--duration) infinite ease-in-out;
    }
    .loader .box:nth-child(1) { inset:40%; z-index:99; }
    .loader .box:nth-child(2) { inset:30%; z-index:98; border-color:rgba(150,200,255,0.5); animation-delay:0.4s; }
    .loader .box:nth-child(3) { inset:20%; z-index:97; border-color:rgba(150,200,255,0.35); animation-delay:0.8s; }
    .loader .box:nth-child(4) { inset:10%; z-index:96; border-color:rgba(150,200,255,0.2); animation-delay:1.2s; }
    .loader .box:nth-child(5) { inset:0%; z-index:95; border-color:rgba(150,200,255,0.08); animation-delay:1.6s; }
    .loader .logo { position:absolute; inset:0; display:grid; place-content:center; padding:28%; z-index:100; }
    .loader .logo img { width:100%; animation:logo-pulse var(--duration) infinite ease-in-out; }
    @keyframes ripple {
      0%,100% { transform:scale(1); box-shadow:rgba(0,80,200,0.15) 0px 10px 10px 0px; }
      50% { transform:scale(1.3); box-shadow:rgba(0,80,200,0.20) 0px 30px 20px 0px; }
    }
    @keyframes logo-pulse { 0%,100% { opacity:0.5; } 50% { opacity:1; } }

    /* ══ UPLOAD OPTION 2 ══ */
    .upload-inner {{
      display:flex; flex-direction:column; gap:14px; padding:22px 20px;
    }}
    .upload-title {{
      font-size:15px; font-weight:700; color:#fff;
      text-shadow:0 1px 6px rgba(0,40,120,0.3); text-align:center;
    }}
    .upload-sub {{ font-size:12px; color:rgba(200,220,255,0.7); text-align:center; }}

    /* Zone drop */
    .drop-zone {{
      border:2px dashed rgba(150,200,255,0.5);
      border-radius:18px; padding:24px 16px;
      display:flex; flex-direction:column; align-items:center; gap:12px;
      cursor:pointer; transition:border-color 0.3s ease, background 0.3s ease;
      background:rgba(255,255,255,0.04);
    }}
    .drop-zone:hover, .drop-zone.dragover {{
      border-color:rgba(150,200,255,0.9);
      background:rgba(100,160,255,0.08);
    }}
    .drop-icon {{
      width:56px; height:56px; border-radius:50%;
      background:rgba(100,160,255,0.18);
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 0 0 8px rgba(100,160,255,0.08);
      transition:background 0.3s;
    }}
    .drop-icon svg {{ width:26px; height:26px; fill:rgba(180,210,255,0.9); }}
    .drop-text {{ font-size:13px; color:rgba(200,230,255,0.85); font-weight:600; text-align:center; }}
    .drop-hint {{ font-size:11px; color:rgba(180,210,255,0.55); text-align:center; }}

    /* Fichier sélectionné */
    .file-preview {{
      display:none;
      background:rgba(255,255,255,0.10);
      border-radius:14px; padding:12px 14px;
      align-items:center; gap:12px;
    }}
    .file-preview.visible {{ display:flex; }}
    .file-icon {{
      width:40px; height:40px; border-radius:10px;
      background:linear-gradient(135deg,#0069ff,#00c6ff);
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }}
    .file-icon svg {{ width:20px; height:20px; fill:white; }}
    .file-info {{ flex:1; min-width:0; }}
    .file-name {{ font-size:13px; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }}
    .file-size {{ font-size:11px; color:rgba(200,220,255,0.6); margin-top:2px; }}
    .file-remove {{
      width:28px; height:28px; border-radius:50%; border:none; cursor:pointer;
      background:rgba(255,255,255,0.15); color:#fff; font-size:16px;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
      transition:background 0.2s;
    }}
    .file-remove:hover {{ background:rgba(255,80,80,0.3); }}

    /* Boutons upload/cancel */
    .upload-btns {{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }}
    .btn-cancel {{
      height:2.8em; border-radius:30em;
      font-size:14px; font-family:'Poppins',inherit; font-weight:700;
      border:1.5px solid rgba(200,220,255,0.4); cursor:pointer;
      color:rgba(200,220,255,0.85); background:transparent;
      transition:all 0.2s;
    }}
    .btn-cancel:hover {{ background:rgba(255,255,255,0.08); }}
    .btn-upload {{
      height:2.8em; border-radius:30em;
      font-size:14px; font-family:'Poppins',inherit; font-weight:700;
      border:none; cursor:pointer;
      color:#fff;
      background:linear-gradient(135deg,#0069ff,#00c6ff);
      box-shadow:0 4px 16px rgba(0,105,255,0.40);
      transition:all 0.2s; opacity:0.5; pointer-events:none;
    }}
    .btn-upload.ready {{ opacity:1; pointer-events:auto; }}
    .btn-upload:hover {{ box-shadow:0 6px 20px rgba(0,105,255,0.5); transform:translateY(-1px); }}

    #file-input {{ display:none; }}
</style>
</head>

    <div class="glass-card card-mail" id="upload-card">
      <div class="glass-filter"></div><div class="glass-overlay"></div><div class="glass-specular"></div>
      <div class="glass-content upload-inner">
        <div class="upload-title">Envoyez-nous votre document</div>

        <!-- Zone drop -->
        <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
          <div class="drop-icon">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          </div>
          <div class="drop-text">Appuyez pour joindre un fichier</div>
          <div class="drop-hint">Ordonnance, mutuelle, document PDF ou image</div>
        </div>
        <input type="file" id="file-input" accept="image/*,.pdf,.doc,.docx">

        <!-- Preview fichier -->
        <div class="file-preview" id="file-preview">
          <div class="file-icon">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/></svg>
          </div>
          <div class="file-info">
            <div class="file-name" id="file-name">document.pdf</div>
            <div class="file-size" id="file-size">—</div>
          </div>
          <button class="file-remove" onclick="clearFile()">✕</button>
        </div>

        <!-- Boutons -->
        <div class="upload-btns">
          <button class="btn-cancel" onclick="clearFile()">Annuler</button>
          <button class="btn-upload" id="btn-upload" onclick="sendMail()">Envoyer</button>
        </div>
      </div>
    </div>

  <script>
    const fileInput = document.getElementById('file-input');
    const dropZone  = document.getElementById('drop-zone');
    const preview   = document.getElementById('file-preview');
    const fileName  = document.getElementById('file-name');
    const fileSize  = document.getElementById('file-size');
    const btnUpload = document.getElementById('btn-upload');
    let selectedFile = null;

    function formatSize(bytes) {{
      if (bytes < 1024) return bytes + ' o';
      if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' Ko';
      return (bytes/1048576).toFixed(1) + ' Mo';
    }}

    function showFile(file) {{
      selectedFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = formatSize(file.size);
      preview.classList.add('visible');
      dropZone.style.display = 'none';
      btnUpload.classList.add('ready');
    }}

    function clearFile() {{
      selectedFile = null;
      fileInput.value = '';
      preview.classList.remove('visible');
      dropZone.style.display = '';
      btnUpload.classList.remove('ready');
    }}

    fileInput.addEventListener('change', () => {{
      if (fileInput.files[0]) showFile(fileInput.files[0]);
    }});

    /* Drag & drop */
    dropZone.addEventListener('dragover', e => {{ e.preventDefault(); dropZone.classList.add('dragover'); }});
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {{
      e.preventDefault(); dropZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) showFile(e.dataTransfer.files[0]);
    }});

    function sendMail() {{
      if (!selectedFile) return;
      // Ouvre Gmail avec le fichier sélectionné en pièce jointe via mailto
      // Note: mailto ne supporte pas les PJ nativement — on ouvre Gmail compose
      const subject = encodeURIComponent('Document de : NOM Prénom — ' + selectedFile.name);
      const body = encodeURIComponent(
        'Bonjour,\n\nVeuillez trouver ci-joint mon document : ' + selectedFile.name +
        '\n\nCordialement,'
      );
      // Stratégie : ouvre mailto pour l'app mail native avec fichier joint possible
      // + fallback Gmail web
      const mailtoLink = 'mailto:lawane.adjid@gmail.com?subject=' + subject + '&body=' + body;

      // Tenter d'ouvrir l'app mail native (qui supporte les PJ sur mobile)
      const a = document.createElement('a');
      a.href = mailtoLink;
      a.click();
    }}
  </script>
